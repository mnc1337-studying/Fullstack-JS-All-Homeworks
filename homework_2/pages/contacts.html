<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зв'язок з нами</title>
</head>

<body>
    <h1>Завітайте в гості</h1>
    <div>
        <p><i>вул. Кавова, 29, Київ</i></p>
        <p><i>Телефон: <a href="tel:+380991234567">+38 (099) 123-45-67</a></i></p>
        <p><i>Графік роботи: Пн-Пт: 08:00 - 21:00 | Сб-Нд: 09:00 - 22:00</i></p>
    </div>

    <div>
        <h2>Напишіть нам</h2>
        <form>
            <div>
                <label for="name-input">Ім'я:</label>
                <input type="text" placeholder="Ваше ім'я" id="name-input" required>
            </div>
            <br>

            <div>
                <label for="email-input">Електронна пошта:</label>
                <input type="email" placeholder="Ваш Email" id="email-input" required>
            </div>
            <br>

            <div>
                <label for="select-option">Обрати опцію:</label>
                <select id="select-option">
                    <option value="feedback">Відгук про роботу</option>
                    <option value="cooperation">Пропозиція співпраці</option>
                    <option value="order">Питання щодо замовлення зерен</option>
                </select>
            </div>
            <br>

            <button>Надіслати...</button>
        </form>
    </div>

    <br>

    <a href="/">Повернутися на основну сторінку</a>
</body>

</html>
