<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Mondrian Exact Table</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <table class="mondrian-table">
        <tr style="height: 52px;">
            <td class="white" style="width: 52px;"></td>
            <td class="white" style="width: 58px;"></td>
            <td class="white" style="width: 172px;"></td>
            <td class="white" style="width: 32px;"></td>
            <td class="yellow" style="width: 154px;"></td>
            <td class="white" style="width: 20px;" rowspan="2" colspan="2"></td>
        </tr>
        <tr style="height: 104px;">
            <td class="white"></td>
            <td class="red" colspan="3" rowspan="2"></td>
            <td class="yellow"></td>
        </tr>
        <tr style="height: 106px;">
            <td class="white" rowspan="2"></td>
            <td class="white" style="width: 76px;"></td>
            <td class="white" style="width: 78px;" colspan="2"></td>
        </tr>
        <tr style="height: 98px;">
            <td class="black" colspan="2" rowspan="2"></td>
            <td class="white"></td>
            <td class="white" colspan="2"></td>
            <td class="red" rowspan="4" style="width: 40px;"></td>
        </tr>
        <tr style="height: 48px;">
            <td class="yellow" rowspan="3"></td>
            <td class="white"></td>
            <td class="blue" colspan="2" rowspan="2"></td>
        </tr>
        <tr style="height: 34px;">
            <td class="white" colspan="2"></td>
            <td class="black"></td>
        </tr>
        <tr style="height: 24px;">
            <td class="white" colspan="4"></td>
        </tr>
    </table>

</body>

</html>
